name: windows

on:
    push:
        branches: [master, main]
    pull_request:
    workflow_dispatch:

jobs:
    test-windows:
        name: Test on Windows
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache Relaton bibliography data
              uses: actions/cache@v4
              with:
                  path: ~/relaton
                  key: relaton-${{ hashFiles('**/*.adoc') }}
                  restore-keys: relaton-

            - name: Install Metanorma
              run: choco install metanorma -y

            - name: Compile document
              run: metanorma compile document.adoc
