name: generate

on:
    push:
        branches: [master, main]
    pull_request:
    workflow_dispatch:

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache Relaton bibliography data
              uses: actions/cache@v4
              with:
                  path: relaton
                  key: relaton-${{ hashFiles('**/*.adoc') }}
                  restore-keys: relaton-

            - name: Compile document (Docker)
              run: |
                  docker run --rm \
                    -v "$(pwd)":/metanorma \
                    -w /metanorma \
                    metanorma/metanorma \
                    metanorma compile document.adoc --agree-to-terms

            - name: Upload generated documents
              uses: actions/upload-artifact@v4
              with:
                  name: generated-documents
                  path: |
                      document.html
                      document.pdf
                      document.xml
                      document.doc
                  if-no-files-found: warn
